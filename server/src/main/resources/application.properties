spring.application.name=codeflow
server.port=8001

# лЎңм»¬ лҜјк°җ м •ліҙлҠ” application-local.propertiesм—җ мһ‘м„ұ (gitignoreлҗЁ)
# н…ңн”ҢлҰҝ: application-local.properties.example м°ёкі 
spring.config.import=optional:classpath:application-local.properties

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codeflow}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=https://codeflow.dong02.com/login/oauth2/code/github

# OAuth2 redirect (лЎңк·ёмқё м„ұкіө нӣ„ н”„лЎ нҠёлЎң ліҙлӮј URI)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:https://web.dong02.com/oauth/callback}

google.gemini.api.key=${GOOGLE_GEMINI_API_KEY}

# Docker мӢӨн–ү нҷҳкІҪ м„Өм •
# лЎңм»¬: docker.network л№„мӣҢл‘җл©ҙ кё°ліё bridge мӮ¬мҡ© (localhost м—°кІ°)
# Docker л°°нҸ¬: codeflow-net мңјлЎң м„Өм •
docker.network=${DOCKER_NETWORK:}