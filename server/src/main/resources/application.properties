spring.application.name=codeflow

# лЎңм»¬ лҜјк°җ м •ліҙлҠ” application-local.propertiesм—җ мһ‘м„ұ (gitignoreлҗЁ)
# н…ңн”ҢлҰҝ: application-local.properties.example м°ёкі 
spring.config.import=optional:classpath:application-local.properties

# H2 мқёл©”лӘЁлҰ¬ DB (к°ңл°ңмҡ©)
spring.datasource.url=jdbc:h2:mem:codeflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# H2 мҪҳмҶ” (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000
jwt.refresh-expiration=1209600000
